<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة الإنترنت</title>
    <style>
        /* تصميم الخلفية البنفسجية المتدرجة */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        /* صندوق تسجيل الدخول المودرن */
        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            width: 320px;
            text-align: center;
            border: 1px rgba(255,255,255,0.2) solid;
        }
        h2 { margin-bottom: 20px; font-size: 24px; }
        .dns-name { color: #fbd38d; font-size: 14px; margin-bottom: 25px; }
        
        /* تصميم خانة إدخال الكرت الفردية */
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 16px;
            text-align: center;
            box-sizing: border-box;
            outline: none;
        }
        /* تصميم زر تسجيل الدخول */
        button {
            width: 100%;
            padding: 12px;
            background: #48bb78;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #38a169; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>أهلاً بك في شبكتنا</h2>
    <div class="dns-name">تسجيل الدخول الرقمي</div>

    <form name="login" action="http://10.5.50.1/login" method="post" onSubmit="return doLogin()">
        <input type="hidden" name="dst" value="http://www.google.com" />
        <input type="hidden" name="popup" value="true" />
        <input type="hidden" name="username" id="username" value="">

        <input type="text" name="password" id="password" placeholder="أدخل كود الكرت هنا" required autocomplete="off">
        
        <button type="submit">تسجيل الدخول</button>
    </form>
</div>

<script>
// السكربت لنسخ كود الكرت وجعله اسماً وكلمة سر معاً قبل الإرسال للراوتر
function doLogin() {
    document.getElementById('username').value = document.getElementById('password').value;
    return true;
}
</script>

</body>
</html>
